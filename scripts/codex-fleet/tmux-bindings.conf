# codex-fleet tmux bindings — iOS-style menus
#
# Source after `tmux new-session` succeeds:
#   tmux source-file scripts/codex-fleet/tmux-bindings.conf
#
# Bindings:
#   prefix m       — open iOS Action Sheet (down, swap, retarget, open watcher)
#   prefix Tab     — open Section Jump grid (Overview / Fleet / Plan / Waves / Review)
#   prefix Ctrl+H  — open the iOS-style keyboard-help popup

# Resolve repo root: tmux source-file evaluates literal commands and cannot
# derive paths from this conf's own location, so callers must export
# CODEX_FLEET_REPO_ROOT in the env of the `tmux` invocation that sources
# this file. full-bringup.sh sets it automatically; install.sh writes the
# export to your shell rc.
bind-key m display-popup -B -E -w 60 -h 16 \
  "bash ${CODEX_FLEET_REPO_ROOT:?CODEX_FLEET_REPO_ROOT must be set before sourcing tmux-bindings.conf}/scripts/codex-fleet/bin/menu-action-sheet.sh"

# prefix Tab opens the window jumper. Plain Tab is intentionally left
# alone so shell tab-completion inside panes keeps working — operators
# who want bare Tab can `bind-key -T root Tab ...` in their own config.
bind-key Tab display-popup -B -E -w 84 -h 22 -x C -y C \
  "bash ${CODEX_FLEET_REPO_ROOT:?CODEX_FLEET_REPO_ROOT must be set before sourcing tmux-bindings.conf}/scripts/codex-fleet/bin/section-jump-chooser.sh"

# prefix Ctrl+H opens the iOS-style keyboard-help popup. Same screen the
# pane right-click menu surfaces under its `?` row — bound here so the
# user can reach it without right-clicking a pane.
bind-key C-h display-popup -B -E -w 76 -h 34 -x C -y C \
  "bash ${CODEX_FLEET_REPO_ROOT:?CODEX_FLEET_REPO_ROOT must be set before sourcing tmux-bindings.conf}/scripts/codex-fleet/bin/help-popup.sh"
