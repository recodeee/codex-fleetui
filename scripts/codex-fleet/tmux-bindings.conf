# codex-fleet tmux bindings — iOS-style menus
#
# Sourced automatically from scripts/codex-fleet/tmux/codex-fleet-overlay.conf
# (the overlay loaded by oh-my-tmux when the fleet runs on its dedicated
# socket). Can also be sourced manually:
#   tmux source-file scripts/codex-fleet/tmux-bindings.conf
#
# Bindings:
#   prefix m       — open iOS Action Sheet (down, swap, retarget, open watcher)
#   prefix Tab     — open Section Jump grid (Overview / Fleet / Plan / Waves / Review)
#   prefix Ctrl+H  — open the iOS-style keyboard-help popup
#
# Repo-root resolution:
#   The bound display-popup commands invoke bash with an absolute path to a
#   helper script. The path uses `${CODEX_FLEET_REPO_ROOT}` which the shell
#   inside display-popup expands at execution time from tmux's server env.
#   Earlier revisions of this file used the shell `${VAR:?ERR}` default
#   syntax; tmux 3.x rejects that at config-parse time with
#   `invalid environment variable`, so it has been removed. The contract is
#   now: full-bringup.sh / scripts/codex-fleet/tmux/up.sh sets
#   CODEX_FLEET_REPO_ROOT in the env of the tmux server before starting it
#   (and additionally pushes it to the server via `set-environment -g`), so
#   the variable is available to every binding at fire time.
#
# Single-quoted command strings below: tmux treats single-quoted strings as
# literal — `${...}` inside is passed through to bash, NOT expanded by
# tmux. That keeps tmux's parser away from shell syntax it doesn't
# understand (the `${VAR:?MSG}` rejection) and defers expansion to bash
# at the moment the binding fires.

bind-key m display-popup -B -E -w 60 -h 16 \
  'bash "${CODEX_FLEET_REPO_ROOT}/scripts/codex-fleet/bin/menu-action-sheet.sh"'

# prefix Tab opens the window jumper. Plain Tab is intentionally left
# alone so shell tab-completion inside panes keeps working — operators
# who want bare Tab can `bind-key -T root Tab ...` in their own config.
bind-key Tab display-popup -B -E -w 84 -h 22 -x C -y C \
  'bash "${CODEX_FLEET_REPO_ROOT}/scripts/codex-fleet/bin/section-jump-chooser.sh"'

# prefix Ctrl+H opens the iOS-style keyboard-help popup. Same screen the
# pane right-click menu surfaces under its `?` row — bound here so the
# user can reach it without right-clicking a pane.
bind-key C-h display-popup -B -E -w 76 -h 34 -x C -y C \
  'bash "${CODEX_FLEET_REPO_ROOT}/scripts/codex-fleet/bin/help-popup.sh"'
