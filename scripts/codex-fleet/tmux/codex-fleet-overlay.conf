# codex-fleet-overlay.conf — committed customizations layered on top of
# vendored oh-my-tmux. Sourced from vendor/oh-my-tmux/.tmux.conf.local
# by scripts/codex-fleet/tmux/setup.sh.
#
# What lives here:
#   - TPM plugin list (oh-my-tmux owns TPM itself; we just declare plugins)
#   - codex-fleet binding extensions (the iOS action sheet, section jumper)
#   - hooks for the existing fleet chrome (style-tabs.sh wins over oh-my-tmux's
#     status bar by running AFTER tmux loads this file — that's intentional;
#     PR #30 made the codex-fleet tab strip the single source of truth)
#
# What does NOT live here:
#   - the oh-my-tmux upstream defaults (those live in vendor/oh-my-tmux/.tmux.conf)
#   - operator-personal tmux tweaks (those go in vendor/oh-my-tmux/.tmux.conf.local
#     directly — the overlay is for fleet-wide commits, the .local is for operator
#     overrides that survive `tmux/setup.sh` re-runs)

# ---------------------------------------------------------------------------
# Plugins (oh-my-tmux drives TPM; we list plugins here)
# ---------------------------------------------------------------------------
# tmux-autoreload — watches the active .tmux.conf and runs `tmux source-file`
# on change. Saves a manual `prefix r` while iterating on style-tabs.sh /
# this overlay / .tmux.conf.local. Requires `entr` on the system (Linux:
# `apt install entr`; macOS: `brew install entr`).
set -g @plugin 'b0o/tmux-autoreload'

# tmux-agent-indicator — tracks AI-agent pane state via pane borders / window
# titles / status icons. Functionally overlapping with the existing
# fleet-tick.sh @panel rewriting (which is the source of truth for the fleet's
# tab labels). Left disabled by default to avoid two systems fighting over the
# same surface. To trial it: uncomment, restart the fleet tmux server, watch
# for double-stamping of pane state in the tab strip. If style-tabs.sh's
# window-status-format wins (it should, since it runs after plugin init), the
# plugin can stay and provide pane-border + window-title coverage.
# set -g @plugin 'kotechakos/tmux-agent-indicator'

# ---------------------------------------------------------------------------
# Codex-fleet iOS-style bindings (prefix-m action sheet, prefix-Tab jumper,
# prefix-C-h help).
# ---------------------------------------------------------------------------
# tmux-bindings.conf was rewritten to use single-quoted command strings
# with `${CODEX_FLEET_REPO_ROOT}` inside, so tmux's config-parser stays
# clear of the `${VAR:?MSG}` syntax it used to reject. The env var
# itself is pushed into the tmux server by up.sh / full-bringup.sh via
# `set-environment -g`.
#
# The bindings themselves are sourced IMPERATIVELY from up.sh /
# full-bringup.sh AFTER the server has finished initial config processing.
# We don't source from the overlay here because oh-my-tmux's
# `_apply_bindings` (called inside `_apply_configuration`) runs after the
# overlay loads and would re-stamp prefix-m / prefix-Tab / prefix-C-h
# back to its defaults — the same lifecycle issue documented for the
# `#!important` settings overrides (see setup.sh).

# ---------------------------------------------------------------------------
# Status-bar coexistence note
# ---------------------------------------------------------------------------
# style-tabs.sh runs AFTER tmux loads this overlay (called from up.sh once
# windows exist). It overwrites window-status-format / window-status-current-
# format / status-left / status-right with the iOS-style tab pills. That's by
# design — PR #30 made codex-fleet's strip the single source of truth.
# Oh-my-tmux's status-bar defaults from .tmux.conf still get set first
# (briefly), then style-tabs.sh stamps over them. If a future change moves
# style-tabs.sh's logic into this overlay, set the keys here directly.

# ---------------------------------------------------------------------------
# Note on settings that override oh-my-tmux defaults
# ---------------------------------------------------------------------------
# The fleet-specific `set` overrides (mouse on, history-limit, pane border
# colors) live in vendor/oh-my-tmux/.tmux.conf.local directly, marked
# `#!important`. setup.sh stamps them there because oh-my-tmux's
# _apply_important only re-applies lines that match the `#!important`
# regex when scanning .tmux.conf.local — it does NOT recurse into
# source-file'd children. Putting them here would load them once at
# startup but they'd get clobbered by _apply_configuration's defaults.
# See setup.sh for the full explanation.
